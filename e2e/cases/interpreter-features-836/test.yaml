schemaVersion: 2.0.0

commandTests:
  - name: turtle is not importable
    exitCode: 0
    command: /app
    expectedOutput:
      - "OK: turtle and turtledemo are not importable"

fileExistenceTests:
  - name: turtle.py must not exist in interpreter
    path: /app.runfiles/_main/cases/interpreter-features-836/._check_no_turtle.venv/lib/python3.11/turtle.py
    shouldExist: false

  - name: turtledemo must not exist in interpreter
    path: /app.runfiles/_main/cases/interpreter-features-836/._check_no_turtle.venv/lib/python3.11/turtledemo
    shouldExist: false
