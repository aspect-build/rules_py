[project]
name = "manifest-extras-test"
version = "0.0.0"
requires-python = ">=3.11"
# Plain dependency on requests. The extra is requested at the manifest
# level via tool.uv.override-dependencies, which lands in uv.lock as
# [manifest] overrides rather than as part of the project's
# requires-dist. Resolution must thread that into the dep graph so the
# optional dependency (pysocks for the `socks` extra) is materialized.
dependencies = ["requests"]

[dependency-groups]
test = ["manifest-extras-test"]

[tool.uv]
override-dependencies = ["requests[socks]"]
