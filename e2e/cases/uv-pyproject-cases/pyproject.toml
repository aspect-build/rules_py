[project]
name = "uv-pyproject-cases"
version = "0.0.0"
description = "Umbrella project providing common Python deps shared across the pyproject.toml regression cases under //cases/uv-pyproject-cases/."
requires-python = ">=3.11"
dependencies = [
    # Each case lists the package it exercises here; the umbrella exists so a
    # single uv.lock pins them all. `build` + `setuptools` are the default
    # build deps for sdist cases (wired via setup.MODULE.bazel).
    "build",
    "pyahocorasick==2.2.0",
    "setuptools",
]

[tool.uv]
# Force pyahocorasick from sdist so the pep517_whl build path runs end-to-end
# (the wheels on PyPI would short-circuit it).
#
# Why pyahocorasick==2.2.0 specifically: that sdist ships setup.py + setup.cfg
# only, with NO pyproject.toml. That's the shape that exercises
# build_helper.py's "no pyproject — route through `python -m build`" branch
# (post-dbc4272). If a future pyahocorasick release adds a pyproject.toml,
# this case will silently stop covering that branch — re-pin to whatever
# version still has the bare-setup.py shape, or swap in another package.
no-binary-package = ["pyahocorasick"]
