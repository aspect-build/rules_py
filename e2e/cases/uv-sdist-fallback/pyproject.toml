[project]
name = "uv_sdist_fallback"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
    # `build` and `setuptools` are in `dependencies` (not just transitive
    # build tooling) so they surface in the project repo as deps of the
    # pep517_whl build_tool that builds cowsay from source — see
    # [tool.uv] no-binary-package below.
    "build",
    "setuptools",
    "cowsay==6.0",
    "tqdm==4.52.0",
]

# cowsay and tqdm both ship an sdist and a `py3-none-any.whl`. Forcing them to
# build from source exercises both annotation styles end-to-end.
[tool.uv]
no-binary-package = ["cowsay", "tqdm"]

[tool.uv.extra-build-dependencies]
# `packaging` is intentionally absent from `default_build_dependencies`, so
# the tqdm snapshot catches a broken uv-native annotation path.
tqdm = [
    # `ssl` is an empty setuptools extra that exercises extra-qualified
    # requirements without expanding this fixture's lockfile.
    "setuptools[ssl]==80.10.2",
    "packaging; sys_platform != 'win32'",
    "packaging; sys_platform != 'imaginary'",
    { requirement = "pyproject-hooks", match-runtime = true },
]
