[project]
name = "uv_sdist_native_annotation"
version = "0.0.0"
requires-python = ">=3.11"
dependencies = [
    # `build` and `setuptools` are in `dependencies` (not just transitive
    # build tooling) so they surface in the project repo as deps of the
    # build_tool that builds cowsay from source — see
    # [tool.uv] no-binary-package below.
    "build",
    "setuptools",
    "cowsay==6.0",
]

# Force cowsay to build from source so the sdist_build repo (and its
# `native = true` annotation, see annotations.toml) is actually exercised.
[tool.uv]
no-binary-package = ["cowsay"]
