syntax = "proto3";

package rules_py.e2e.proto_compat;

// A trivial message used to prove that Python code generated by
// rules_proto_grpc_python (which exposes rules_python's PyInfo provider) is
// consumable from an aspect_rules_py py_test after the PyInfo re-export
// refactor (#1223).
message Greeting {
  string name = 1;
  string message = 2;
}
