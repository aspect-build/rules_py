name: CI - Aspect Workflows

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

jobs:
    buildifier:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Buildifier
              run: aspect buildifier --task-key=buildifier
    gazelle:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Gazelle
              run: aspect gazelle --task-key=gazelle
    test:
        name: test (${{ matrix.workspace.path }}, ${{ matrix.bazel.id }})
        runs-on: ${{ matrix.workspace.runner }}
        strategy:
            fail-fast: false
            matrix:
                workspace:
                - { path: ".", slug: "root", runner: "ubuntu-latest" }
                # e2e is the large workspace; give it a beefier runner.
                - { path: "e2e", slug: "e2e", runner: "ubuntu-22.04-32core" }
                - { path: "examples/debugger", slug: "examples-debugger", runner: "ubuntu-latest" }
                - { path: "examples/dev_deps", slug: "examples-dev_deps", runner: "ubuntu-latest" }
                - { path: "examples/uv_pip_compile", slug: "examples-uv_pip_compile", runner: "ubuntu-latest" }
                - { path: "examples/protobuf", slug: "examples-protobuf", runner: "ubuntu-22.04-32core" }
                bazel:
                - { id: "bazel-8", version: "8.x", flags: "--bazel-flag=--test_tag_filters=-skip-on-bazel8" }
                - { id: "bazel-9", version: "9.x", flags: "--bazel-flag=--test_tag_filters=-skip-on-bazel9" }
        env:
            USE_BAZEL_VERSION: ${{ matrix.bazel.version }}
        steps:
            - uses: actions/checkout@v6
            - uses: aspect-build/setup-aspect@c22a8f64fb38f82f59ce809cd7eb9f8ae096da44 # v2026.23.2
              with:
                aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
            - name: Test
              working-directory: ${{ matrix.workspace.path }}
              run: aspect test --task-key=test-${{ matrix.workspace.slug }}-${{ matrix.bazel.id }} ${{ matrix.bazel.flags }} -- //...
            # This fixture's root toolchain declarations live in its own module,
            # not the parent e2e module used by the matrix entry above.
            - name: Interpreter toolchain settings
              if: matrix.workspace.slug == 'e2e'
              working-directory: e2e/cases/interpreter-toolchain-settings
              run: |
                aspect test \
                  --task-key=test-interpreter-toolchain-settings-${{ matrix.bazel.id }} \
                  ${{ matrix.bazel.flags }} \
                  --bazel-flag=--lockfile_mode=off \
                  -- \
                  //:resolved_311_test \
                  //:resolved_312_test \
                  //:resolved_313_freethreaded_test \
                  //:resolved_313_glibc_test \
                  //:resolved_313_musl_test
            # Standalone scripts that drive bazel directly (e.g. asserting a
            # build *fails*), so they can't be an `sh_test` under `//...` above.
            - name: e2e standalone test.sh scripts
              if: matrix.workspace.slug == 'e2e'
              run: |
                set -uo pipefail
                status=0
                for script in e2e/cases/*/test.sh; do
                    echo "::group::${script}"
                    if bash "${script}"; then
                        echo "PASS: ${script}"
                    else
                        echo "FAIL: ${script}"
                        status=1
                    fi
                    echo "::endgroup::"
                done
                exit "${status}"
