name: Startup Benchmark

on:
  pull_request:
  push:
    branches: [main]

env:
  BCR_VERSION: "1.11.7"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: rules_py_pr

      - name: Checkout HEAD main
        uses: actions/checkout@v6
        with:
          ref: main
          path: rules_py_main

      - name: Install hyperfine
        run: |
          set -euo pipefail
          HYPERFINE_VERSION="1.18.0"
          DEB="hyperfine_${HYPERFINE_VERSION}_amd64.deb"
          URL="https://github.com/sharkdp/hyperfine/releases/download/v${HYPERFINE_VERSION}/${DEB}"
          wget -qO "$DEB" "$URL"
          sudo dpkg -i "$DEB"
          rm -f "$DEB"
          hyperfine --version

      # ── BCR baseline ────────────────────────────────────────────────────────
      - name: Benchmark BCR ${{ env.BCR_VERSION }}
        run: |
          set -euo pipefail
          cd rules_py_pr/benchmark/startup
          python3 generate_module.py bcr --version "${BCR_VERSION}"

          OUT_BASE="/tmp/bazel-bcr"
          rm -rf "$OUT_BASE"

          START=$(date +%s%N)
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc build --disk_cache= //:bench //:bench_syspath
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))
          echo "{\"build_ms\": $BUILD_MS}" > "../../../bcr-build.json"

          BIN=$(bazel --output_base="$OUT_BASE" cquery //:bench --disk_cache= --output=starlark --starlark:expr='target.files_to_run.executable.path' | tail -n1)
          test -x "$BIN" || { echo "ERROR: benchmark binary not executable: $BIN"; exit 1; }
          # Set RUNFILES_DIR as `bazel run` would. Without it, launchers fall back to
          # the sibling .runfiles_manifest, whose unresolved-symlink entries (the venv
          # python) are relative link targets that cannot be exec'd.
          RUNFILES_DIR="$PWD/$BIN.runfiles" hyperfine --warmup 5 --runs 50 --export-json ../../../bcr.json "$BIN"

          BIN_SP=$(bazel --output_base="$OUT_BASE" cquery //:bench_syspath --disk_cache= --output=starlark --starlark:expr='target.files_to_run.executable.path' | tail -n1)
          test -x "$BIN_SP" || { echo "ERROR: bench_syspath binary not executable: $BIN_SP"; exit 1; }
          RUNFILES_DIR="$PWD/$BIN_SP.runfiles" "$BIN_SP" "$GITHUB_WORKSPACE/bcr-syspath.json"

      # ── HEAD main ───────────────────────────────────────────────────────────
      - name: Benchmark HEAD main
        run: |
          set -euo pipefail
          cd rules_py_pr/benchmark/startup
          python3 generate_module.py local --path "$GITHUB_WORKSPACE/rules_py_main"

          OUT_BASE="/tmp/bazel-main"
          rm -rf "$OUT_BASE"

          START=$(date +%s%N)
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc build --disk_cache= //:bench //:bench_syspath
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))
          echo "{\"build_ms\": $BUILD_MS}" > "../../../main-build.json"

          BIN=$(bazel --output_base="$OUT_BASE" cquery //:bench --disk_cache= --output=starlark --starlark:expr='target.files_to_run.executable.path' | tail -n1)
          test -x "$BIN" || { echo "ERROR: benchmark binary not executable: $BIN"; exit 1; }
          # See the RUNFILES_DIR comment in the BCR step.
          RUNFILES_DIR="$PWD/$BIN.runfiles" hyperfine --warmup 5 --runs 50 --export-json ../../../main.json "$BIN"

          BIN_SP=$(bazel --output_base="$OUT_BASE" cquery //:bench_syspath --disk_cache= --output=starlark --starlark:expr='target.files_to_run.executable.path' | tail -n1)
          test -x "$BIN_SP" || { echo "ERROR: bench_syspath binary not executable: $BIN_SP"; exit 1; }
          RUNFILES_DIR="$PWD/$BIN_SP.runfiles" "$BIN_SP" "$GITHUB_WORKSPACE/main-syspath.json"

      # ── Current commit (PR) ─────────────────────────────────────────────────
      - name: Benchmark current PR
        run: |
          set -euo pipefail
          cd rules_py_pr/benchmark/startup
          python3 generate_module.py local --path "$GITHUB_WORKSPACE/rules_py_pr"

          OUT_BASE="/tmp/bazel-pr"
          rm -rf "$OUT_BASE"

          START=$(date +%s%N)
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc build --disk_cache= //:bench //:bench_syspath
          END=$(date +%s%N)
          BUILD_MS=$(( (END - START) / 1000000 ))
          echo "{\"build_ms\": $BUILD_MS}" > "../../../pr-build.json"

          BIN=$(bazel --output_base="$OUT_BASE" cquery //:bench --disk_cache= --output=starlark --starlark:expr='target.files_to_run.executable.path' | tail -n1)
          test -x "$BIN" || { echo "ERROR: benchmark binary not executable: $BIN"; exit 1; }
          # See the RUNFILES_DIR comment in the BCR step.
          RUNFILES_DIR="$PWD/$BIN.runfiles" hyperfine --warmup 5 --runs 50 --export-json ../../../pr.json "$BIN"

          BIN_SP=$(bazel --output_base="$OUT_BASE" cquery //:bench_syspath --disk_cache= --output=starlark --starlark:expr='target.files_to_run.executable.path' | tail -n1)
          test -x "$BIN_SP" || { echo "ERROR: bench_syspath binary not executable: $BIN_SP"; exit 1; }
          RUNFILES_DIR="$PWD/$BIN_SP.runfiles" "$BIN_SP" "$GITHUB_WORKSPACE/pr-syspath.json"

      # ── Compare & gate ──────────────────────────────────────────────────────
      - name: Compare results
        id: compare
        continue-on-error: true
        run: |
          set -euo pipefail
          for f in bcr.json main.json pr.json; do
            if [[ ! -f "$f" ]]; then
              echo "ERROR: missing result file: $f"
              exit 1
            fi
          done
          python3 rules_py_pr/benchmark/startup/compare.py bcr.json main.json pr.json | tee benchmark-table.txt

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload benchmark artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bcr.json
            main.json
            pr.json
            bcr-build.json
            main-build.json
            pr-build.json
            bcr-syspath.json
            main-syspath.json
            pr-syspath.json
            benchmark-table.txt
            pr-number.txt
          if-no-files-found: warn

      - name: Fail on regression
        if: steps.compare.outcome == 'failure'
        run: exit 1
