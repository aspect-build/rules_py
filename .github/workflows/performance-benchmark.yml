name: Performance Benchmark

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BCR_VERSION: "2.0.0-alpha.4"
  PACKAGES: "50"

jobs:
  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: bcr
            label: "BCR 2.0.0-alpha.4 (baseline)"
            module: 'bcr --version "${{ env.BCR_VERSION }}"'
            needs-main: false
          - variant: main
            label: "HEAD main"
            module: 'local --path "$GITHUB_WORKSPACE/rules_py_main"'
            needs-main: true
          - variant: pr
            label: "This PR"
            module: 'local --path "$GITHUB_WORKSPACE/rules_py_pr"'
            needs-main: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: rules_py_pr

      - name: Checkout HEAD main
        if: matrix.needs-main
        uses: actions/checkout@v6
        with:
          ref: main
          path: rules_py_main

      - name: Install hyperfine
        run: |
          set -euo pipefail
          HYPERFINE_VERSION="1.18.0"
          DEB="hyperfine_${HYPERFINE_VERSION}_amd64.deb"
          URL="https://github.com/sharkdp/hyperfine/releases/download/v${HYPERFINE_VERSION}/${DEB}"
          wget -qO "$DEB" "$URL"
          sudo dpkg -i "$DEB"
          rm -f "$DEB"

      - name: Generate workspace
        run: |
          set -euo pipefail
          cd rules_py_pr/benchmark/workspace
          python3 generate_workspace.py --root . --packages "${PACKAGES}"

      - name: Benchmark ${{ matrix.variant }}
        run: |
          set -euo pipefail
          cd rules_py_pr/benchmark/workspace
          python3 generate_module.py ${{ matrix.module }}

          OUT_BASE="/tmp/bazel-${{ matrix.variant }}"
          rm -rf "$OUT_BASE"

          # --- analysis ---
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc fetch //...
          python3 ../profile_benchmark.py \
            --runs 10 --warmup 1 \
            --prepare "rm -rf /tmp/bazel-${{ matrix.variant }}-analysis" \
            --output "${GITHUB_WORKSPACE}/${{ matrix.variant }}-analysis.json" \
            --save-profile "${GITHUB_WORKSPACE}/profiles/${{ matrix.variant }}-profile.gz" \
            --save-starlark "${GITHUB_WORKSPACE}/profiles/${{ matrix.variant }}-starlark.pprof.gz" \
            -- bazel --output_base=/tmp/bazel-${{ matrix.variant }}-analysis --bazelrc=../../.github/workflows/ci.bazelrc build --disk_cache= --nobuild --profile={PROFILE} --starlark_cpu_profile={STARPROFILE} //...

          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc query //... --output=package > /tmp/${{ matrix.variant }}-packages.txt
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc query //... > /tmp/${{ matrix.variant }}-targets.txt
          echo "{\"packages\": $(wc -l < /tmp/${{ matrix.variant }}-packages.txt | tr -d ' '), \"targets\": $(wc -l < /tmp/${{ matrix.variant }}-targets.txt | tr -d ' ')}" > "${GITHUB_WORKSPACE}/${{ matrix.variant }}-analysis-aux.json"

          # --- startup ---
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc build --disk_cache= //:bench
          BIN=$(bazel --output_base="$OUT_BASE" cquery //:bench --disk_cache= --output=starlark --starlark:expr='target.files_to_run.executable.path' | tail -n1)
          test -x "$BIN" || { echo "ERROR: bench binary not executable: $BIN"; exit 1; }
          RUNFILES_DIR="$PWD/$BIN.runfiles" hyperfine --warmup 5 --runs 50 --export-json "${GITHUB_WORKSPACE}/${{ matrix.variant }}-startup.json" "$BIN"
          RUNFILES_DIR="$PWD/$BIN.runfiles" "$BIN" "${GITHUB_WORKSPACE}/${{ matrix.variant }}-startup-syspath.json"

      - name: Write raw summary
        run: |
          echo "## ${{ matrix.label }}" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          a = json.load(open('${GITHUB_WORKSPACE}/${{ matrix.variant }}-analysis.json'))
          am = a['analysis_ms']
          print(f'- **Analysis**: {am[\"mean\"]:.0f}ms ±{am[\"stddev\"]:.0f}ms' if 'analysis_ms' in a else '- Analysis: pending')
          s = json.load(open('${GITHUB_WORKSPACE}/${{ matrix.variant }}-startup.json'))
          print(f'- **Startup**: {s[\"results\"][0][\"mean\"]*1000:.1f}ms')
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "- (partial data)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.variant }}
          path: |
            ${{ matrix.variant }}-analysis.json
            ${{ matrix.variant }}-analysis-aux.json
            ${{ matrix.variant }}-startup.json
            ${{ matrix.variant }}-startup-syspath.json
            profiles/

      - name: Update PR comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          set -euo pipefail
          # Download all sibling results that have finished.
          for v in bcr main pr; do
            [ "$v" = "${{ matrix.variant }}" ] && continue
            gh api repos/${{ github.repository }}/actions/artifacts \
              --jq ".artifacts[] | select(.name == \"bench-$v\") | .name" 2>/dev/null | grep -q . \
              && gh api repos/${{ github.repository }}/actions/artifacts \
                --jq ".artifacts[] | select(.name == \"bench-$v\") | .archive_download_url" \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                > /dev/null 2>&1 \
              && echo "sibling $v available" || echo "sibling $v pending"
          done

          # Try to download sibling artifacts (may not exist yet).
          for v in bcr main pr; do
            [ "$v" = "${{ matrix.variant }}" ] && continue
            gh run download "$GITHUB_RUN_ID" -n "bench-$v" -D "/tmp/$v" 2>/dev/null \
              && cp /tmp/$v/${v}-*.json . 2>/dev/null || true
          done

          # Render comparison tables (pending variants show ⏳).
          python3 rules_py_pr/benchmark/compare.py analysis --partial \
            --output-table /tmp/analysis-table.txt \
            bcr-analysis.json main-analysis.json pr-analysis.json 2>/dev/null || true
          python3 rules_py_pr/benchmark/compare.py startup --partial \
            --output-table /tmp/startup-table.txt \
            bcr-startup.json main-startup.json pr-startup.json 2>/dev/null || true
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-number.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          RUNNER_OS: ${{ runner.os }}
        with:
          script: |
            const fs = require('fs');
            const header = '<!-- performance-benchmark -->';
            let body = header + '\n\n';
            try { body += fs.readFileSync('/tmp/analysis-table.txt', 'utf8').trim() + '\n\n'; } catch {}
            try { body += fs.readFileSync('/tmp/startup-table.txt', 'utf8').trim(); + '\n'; } catch {}
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(header));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: body,
              });
            }
