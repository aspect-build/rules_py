name: Performance Benchmark

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BCR_VERSION: "2.0.0-alpha.4"
  PACKAGES: "50"

jobs:
  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: bcr
            label: "BCR 2.0.0-alpha.4 (baseline)"
            needs-main: false
          - variant: main
            label: "HEAD main"
            needs-main: true
          - variant: pr
            label: "This PR"
            needs-main: false
    permissions:
      contents: read
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: rules_py_pr

      - name: Checkout HEAD main
        if: matrix.needs-main
        uses: actions/checkout@v6
        with:
          ref: main
          path: rules_py_main

      - name: Install hyperfine
        run: |
          set -euo pipefail
          HYPERFINE_VERSION="1.18.0"
          DEB="hyperfine_${HYPERFINE_VERSION}_amd64.deb"
          URL="https://github.com/sharkdp/hyperfine/releases/download/v${HYPERFINE_VERSION}/${DEB}"
          wget -qO "$DEB" "$URL"
          sudo dpkg -i "$DEB"
          rm -f "$DEB"

      - name: Generate workspace
        run: |
          set -euo pipefail
          cd rules_py_pr/benchmark/workspace
          python3 generate_workspace.py --root . --packages "${PACKAGES}"

      - name: Benchmark ${{ matrix.variant }}
        run: |
          set -euo pipefail
          cd rules_py_pr/benchmark/workspace
          if [ "${{ matrix.variant }}" = "bcr" ]; then
            python3 generate_module.py bcr --version "${BCR_VERSION}"
          else
            python3 generate_module.py local --path "$GITHUB_WORKSPACE/rules_py_${{ matrix.variant }}"
          fi

          OUT_BASE="/tmp/bazel-${{ matrix.variant }}"
          rm -rf "$OUT_BASE"

          # --- analysis ---
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc fetch //...
          python3 ../profile_benchmark.py \
            --runs 10 --warmup 1 \
            --prepare "rm -rf /tmp/bazel-${{ matrix.variant }}-analysis" \
            --output "${GITHUB_WORKSPACE}/${{ matrix.variant }}-analysis.json" \
            --save-profile "${GITHUB_WORKSPACE}/profiles/${{ matrix.variant }}-profile.gz" \
            --save-starlark "${GITHUB_WORKSPACE}/profiles/${{ matrix.variant }}-starlark.pprof.gz" \
            -- bazel --output_base=/tmp/bazel-${{ matrix.variant }}-analysis --bazelrc=../../.github/workflows/ci.bazelrc build --disk_cache= --nobuild --profile={PROFILE} --starlark_cpu_profile={STARPROFILE} //...

          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc query //... --output=package > /tmp/${{ matrix.variant }}-packages.txt
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc query //... > /tmp/${{ matrix.variant }}-targets.txt
          echo "{\"packages\": $(wc -l < /tmp/${{ matrix.variant }}-packages.txt | tr -d ' '), \"targets\": $(wc -l < /tmp/${{ matrix.variant }}-targets.txt | tr -d ' ')}" > "${GITHUB_WORKSPACE}/${{ matrix.variant }}-analysis-aux.json"

          # --- startup ---
          bazel --output_base="$OUT_BASE" --bazelrc=../../.github/workflows/ci.bazelrc build --disk_cache= //:bench
          BIN=$(bazel --output_base="$OUT_BASE" cquery //:bench --disk_cache= --output=starlark --starlark:expr='target.files_to_run.executable.path' | tail -n1)
          test -x "$BIN" || { echo "ERROR: bench binary not executable: $BIN"; exit 1; }
          RUNFILES_DIR="$PWD/$BIN.runfiles" hyperfine --warmup 5 --runs 50 --export-json "${GITHUB_WORKSPACE}/${{ matrix.variant }}-startup.json" "$BIN"
          RUNFILES_DIR="$PWD/$BIN.runfiles" "$BIN" "${GITHUB_WORKSPACE}/${{ matrix.variant }}-startup-syspath.json"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.variant }}
          path: |
            ${{ matrix.variant }}-analysis.json
            ${{ matrix.variant }}-analysis-aux.json
            ${{ matrix.variant }}-startup.json
            ${{ matrix.variant }}-startup-syspath.json
            profiles/

  report:
    needs: [bench]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          path: rules_py_pr

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: bench-*
          merge-multiple: true

      - name: Compare analysis
        id: analysis
        continue-on-error: true
        run: |
          python3 rules_py_pr/benchmark/compare.py analysis \
            --output-table analysis-table.txt \
            --step-summary "$GITHUB_STEP_SUMMARY" \
            bcr-analysis.json main-analysis.json pr-analysis.json

      - name: Compare startup
        id: startup
        continue-on-error: true
        run: |
          python3 rules_py_pr/benchmark/compare.py startup \
            --output-table startup-table.txt \
            bcr-startup.json main-startup.json pr-startup.json
          cat startup-table.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload report artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            analysis-table.txt
            startup-table.txt
            pr-number.txt
            profiles/
          if-no-files-found: warn

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const startup = fs.existsSync('startup-table.txt') ? fs.readFileSync('startup-table.txt', 'utf8').trim() : '';
            const analysis = fs.existsSync('analysis-table.txt') ? fs.readFileSync('analysis-table.txt', 'utf8').trim() : '';
            const header = '<!-- performance-benchmark -->';
            const body = `${header}\n\n${startup}\n\n${analysis}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(header));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail on regression
        if: steps.analysis.outcome == 'failure' || steps.startup.outcome == 'failure'
        run: exit 1
